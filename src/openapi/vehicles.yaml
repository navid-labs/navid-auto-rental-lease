openapi: 3.1.0
info:
  title: Navid Auto — Vehicles API
  version: 3.0.0

tags:
  - name: vehicles
    description: 차량 관리

paths:
  /vehicles:
    get:
      summary: 차량 목록 조회
      description: 필터/정렬/페이지네이션을 적용한 차량 목록. 공개 엔드포인트.
      operationId: listVehicles
      tags: [vehicles]
      parameters:
        - name: brandId
          in: query
          schema:
            type: string
            format: uuid
        - name: modelId
          in: query
          schema:
            type: string
            format: uuid
        - name: fuelType
          in: query
          schema:
            $ref: '#/components/schemas/FuelType'
        - name: transmissionType
          in: query
          schema:
            $ref: '#/components/schemas/Transmission'
        - name: minPrice
          in: query
          schema:
            type: integer
            minimum: 0
        - name: maxPrice
          in: query
          schema:
            type: integer
            minimum: 0
        - name: minYear
          in: query
          schema:
            type: integer
            minimum: 1990
        - name: maxYear
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          description: "정렬 기준 (예: price_asc, price_desc, year_desc, mileage_asc)"
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 차량 목록
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Vehicle'

    post:
      summary: 차량 등록
      description: 새 차량 리스팅을 생성합니다. DEALER 또는 ADMIN 역할 필요.
      operationId: createVehicle
      tags: [vehicles]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVehicleBody'
      responses:
        '201':
          description: 차량 등록 성공
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [success, vehicleId]
                    properties:
                      success:
                        type: boolean
                        enum: [true]
                      vehicleId:
                        type: string
                        format: uuid
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /vehicles/{id}:
    parameters:
      - $ref: '#/components/parameters/VehicleId'
    patch:
      summary: 차량 정보 수정
      description: 차량 필드를 부분 수정합니다. DEALER(소유자) 또는 ADMIN만 가능.
      operationId: updateVehicle
      tags: [vehicles]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVehicleBody'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      summary: 차량 삭제 (소프트)
      description: 차량을 HIDDEN 상태로 전환합니다. DEALER(소유자) 또는 ADMIN만 가능.
      operationId: deleteVehicle
      tags: [vehicles]
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /vehicles/{id}/status:
    parameters:
      - $ref: '#/components/parameters/VehicleId'
    patch:
      summary: 차량 상태 변경
      description: VehicleStatus를 갱신합니다. 인증 필요.
      operationId: updateVehicleStatus
      tags: [vehicles]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/VehicleStatus'
                note:
                  type: string
                  description: 상태 변경 사유 (선택)
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /vehicles/{id}/approve:
    parameters:
      - $ref: '#/components/parameters/VehicleId'
    post:
      summary: 차량 승인 / 거절
      description: 차량의 ApprovalStatus를 변경합니다. ADMIN만 가능.
      operationId: approveVehicle
      tags: [vehicles]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [APPROVED, REJECTED]
                reason:
                  type: string
                  description: 거절 시 필수
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /vehicles/batch-approve:
    post:
      summary: 차량 일괄 승인
      description: PENDING 상태의 여러 차량을 한 번에 APPROVED로 전환합니다. ADMIN만 가능.
      operationId: batchApproveVehicles
      tags: [vehicles]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicleIds]
              properties:
                vehicleIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /vehicles/{id}/resubmit:
    parameters:
      - $ref: '#/components/parameters/VehicleId'
    post:
      summary: 차량 재심사 요청
      description: REJECTED 차량을 PENDING으로 되돌려 재심사를 요청합니다. DEALER(소유자) 또는 ADMIN만 가능.
      operationId: resubmitVehicle
      tags: [vehicles]
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /vehicles/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/VehicleId'
    post:
      summary: 차량 복원
      description: HIDDEN 상태 차량을 AVAILABLE로 복원합니다. ADMIN만 가능.
      operationId: restoreVehicle
      tags: [vehicles]
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /vehicles/{id}/images:
    parameters:
      - $ref: '#/components/parameters/VehicleId'
    get:
      summary: 차량 이미지 목록
      description: 차량에 등록된 이미지를 순서(order) 기준으로 반환합니다. 공개 엔드포인트.
      operationId: listVehicleImages
      tags: [vehicles]
      responses:
        '200':
          description: 이미지 목록
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [images]
                    properties:
                      images:
                        type: array
                        items:
                          $ref: '#/components/schemas/VehicleImage'
    post:
      summary: 차량 이미지 업로드
      description: 이미지를 업로드합니다. DEALER 또는 ADMIN만 가능. 차량당 최대 10장.
      operationId: uploadVehicleImage
      tags: [vehicles]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 업로드할 이미지 파일 (WebP/JPEG/PNG)
                category:
                  type: string
                  enum: [EXTERIOR, INTERIOR, ENGINE, OTHER]
                  default: OTHER
      responses:
        '201':
          description: 업로드 성공
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [success, image]
                    properties:
                      success:
                        type: boolean
                        enum: [true]
                      image:
                        $ref: '#/components/schemas/VehicleImage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /vehicles/{id}/images/{imageId}:
    parameters:
      - $ref: '#/components/parameters/VehicleId'
      - name: imageId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      summary: 차량 이미지 삭제
      description: 특정 이미지를 삭제합니다. DEALER(소유자) 또는 ADMIN만 가능.
      operationId: deleteVehicleImage
      tags: [vehicles]
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /vehicles/{id}/images/reorder:
    parameters:
      - $ref: '#/components/parameters/VehicleId'
    patch:
      summary: 이미지 순서 변경
      description: orderedImageIds 배열의 인덱스 순서대로 이미지 order를 재설정합니다. DEALER(소유자) 또는 ADMIN만 가능.
      operationId: reorderVehicleImages
      tags: [vehicles]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderedImageIds]
              properties:
                orderedImageIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /vehicles/{id}/inquiry:
    parameters:
      - $ref: '#/components/parameters/VehicleId'
    post:
      summary: 차량 문의 등록
      description: 특정 차량에 대한 상담 문의를 등록합니다. 공개 엔드포인트.
      operationId: createVehicleInquiry
      tags: [vehicles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone, message]
              properties:
                name:
                  type: string
                  minLength: 1
                phone:
                  type: string
                  minLength: 1
                email:
                  type: string
                  format: email
                message:
                  type: string
                  minLength: 1
      responses:
        '201':
          $ref: '#/components/responses/SuccessResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /vehicles/brands:
    get:
      summary: 브랜드 목록
      description: 등록된 모든 브랜드를 반환합니다. 공개 엔드포인트.
      operationId: listBrands
      tags: [vehicles]
      responses:
        '200':
          description: 브랜드 목록
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Brand'

  /vehicles/brands/{id}/models:
    parameters:
      - name: id
        in: path
        required: true
        description: 브랜드 ID
        schema:
          type: string
          format: uuid
    get:
      summary: 브랜드별 모델 목록
      description: 특정 브랜드에 속한 모델 목록을 반환합니다. 공개 엔드포인트.
      operationId: listModelsByBrand
      tags: [vehicles]
      responses:
        '200':
          description: 모델 목록
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CarModel'

  /vehicles/models/{id}/generations:
    parameters:
      - name: id
        in: path
        required: true
        description: 모델 ID
        schema:
          type: string
          format: uuid
    get:
      summary: 모델별 세대 목록
      description: 특정 모델의 세대(Generation) 목록을 반환합니다. 공개 엔드포인트.
      operationId: listGenerationsByModel
      tags: [vehicles]
      responses:
        '200':
          description: 세대 목록
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Generation'

  /vehicles/generations/{id}/trims:
    parameters:
      - name: id
        in: path
        required: true
        description: 세대 ID
        schema:
          type: string
          format: uuid
    get:
      summary: 세대별 트림 목록
      description: 특정 세대에 속한 트림 목록을 반환합니다. 공개 엔드포인트.
      operationId: listTrimsByGeneration
      tags: [vehicles]
      responses:
        '200':
          description: 트림 목록
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Trim'

  /vehicles/lookup-plate:
    get:
      summary: 번호판 조회
      description: 한국 자동차 번호판으로 차량 정보를 조회합니다. DEALER 또는 ADMIN만 가능.
      operationId: lookupPlate
      tags: [vehicles]
      security:
        - cookieAuth: []
      parameters:
        - name: plateNumber
          in: query
          required: true
          description: "한국 번호판 형식 (예: 12가3456)"
          schema:
            type: string
      responses:
        '200':
          description: 번호판 조회 결과
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/PlateResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  parameters:
    VehicleId:
      name: id
      in: path
      required: true
      description: 차량 ID
      schema:
        type: string
        format: uuid

  schemas:
    # ── Enums ──────────────────────────────────────────────────────────────────

    FuelType:
      type: string
      enum: [GASOLINE, DIESEL, LPG, HYBRID, ELECTRIC, HYDROGEN]

    Transmission:
      type: string
      enum: [AUTOMATIC, MANUAL, CVT, DCT]

    VehicleStatus:
      type: string
      enum: [AVAILABLE, RESERVED, RENTED, LEASED, MAINTENANCE, HIDDEN]

    ApprovalStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    ImageCategory:
      type: string
      enum: [EXTERIOR, INTERIOR, ENGINE, OTHER]

    # ── Catalog ────────────────────────────────────────────────────────────────

    Brand:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        nameKo:
          type: string
          nullable: true
        logoUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time

    CarModel:
      type: object
      required: [id, brandId, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
        brandId:
          type: string
          format: uuid
        name:
          type: string
        nameKo:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Generation:
      type: object
      required: [id, carModelId, name, startYear, createdAt]
      properties:
        id:
          type: string
          format: uuid
        carModelId:
          type: string
          format: uuid
        name:
          type: string
        startYear:
          type: integer
        endYear:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    Trim:
      type: object
      required: [id, generationId, name, fuelType, transmission, createdAt]
      properties:
        id:
          type: string
          format: uuid
        generationId:
          type: string
          format: uuid
        name:
          type: string
        fuelType:
          $ref: '#/components/schemas/FuelType'
        engineCC:
          type: integer
          nullable: true
        transmission:
          $ref: '#/components/schemas/Transmission'
        createdAt:
          type: string
          format: date-time

    # ── Vehicle ────────────────────────────────────────────────────────────────

    Vehicle:
      type: object
      required:
        - id
        - trimId
        - dealerId
        - year
        - mileage
        - color
        - price
        - status
        - approvalStatus
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        trimId:
          type: string
          format: uuid
        dealerId:
          type: string
          format: uuid
        year:
          type: integer
          minimum: 1990
        mileage:
          type: integer
          minimum: 0
        color:
          type: string
        licensePlate:
          type: string
          nullable: true
        price:
          type: integer
          minimum: 1
          description: 판매가 (원)
        monthlyRental:
          type: integer
          minimum: 1
          nullable: true
          description: 월 렌탈료 (원)
        monthlyLease:
          type: integer
          minimum: 1
          nullable: true
          description: 월 리스료 (원)
        status:
          $ref: '#/components/schemas/VehicleStatus'
        description:
          type: string
          nullable: true
        approvalStatus:
          $ref: '#/components/schemas/ApprovalStatus'
        rejectionReason:
          type: string
          nullable: true
        approvedBy:
          type: string
          format: uuid
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VehicleImage:
      type: object
      required: [id, url, order]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        order:
          type: integer
          minimum: 0
        isPrimary:
          type: boolean
          default: false
        category:
          $ref: '#/components/schemas/ImageCategory'

    # ── Request bodies ─────────────────────────────────────────────────────────

    CreateVehicleBody:
      type: object
      required: [brandId, modelId, generationId, trimId, year, mileage, color, price]
      properties:
        brandId:
          type: string
          format: uuid
        modelId:
          type: string
          format: uuid
        generationId:
          type: string
          format: uuid
        trimId:
          type: string
          format: uuid
        licensePlate:
          type: string
        year:
          type: integer
          minimum: 1990
        mileage:
          type: integer
          minimum: 0
        color:
          type: string
          minLength: 1
        price:
          type: integer
          minimum: 1
        monthlyRental:
          type: integer
          minimum: 1
        monthlyLease:
          type: integer
          minimum: 1
        description:
          type: string

    UpdateVehicleBody:
      type: object
      description: 수정할 필드만 포함합니다 (partial).
      properties:
        licensePlate:
          type: string
        year:
          type: integer
          minimum: 1990
        mileage:
          type: integer
          minimum: 0
        color:
          type: string
          minLength: 1
        price:
          type: integer
          minimum: 1
        monthlyRental:
          type: integer
          minimum: 1
        monthlyLease:
          type: integer
          minimum: 1
        description:
          type: string

    # ── Plate lookup ───────────────────────────────────────────────────────────

    PlateResult:
      type: object
      description: 번호판 조회로 반환된 차량 기본 정보
      properties:
        brand:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        fuelType:
          type: string
          nullable: true
        engineCC:
          type: integer
          nullable: true
        color:
          type: string
          nullable: true
        transmission:
          type: string
          nullable: true

  # ── Shared responses ─────────────────────────────────────────────────────────

  responses:
    SuccessResponse:
      description: 처리 성공
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                    enum: [true]

    Unauthorized:
      description: 인증되지 않은 요청
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: string
                example: 로그인이 필요합니다.

    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: string
                example: 접근 권한이 없습니다.

    UnprocessableEntity:
      description: 유효성 검사 실패
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    path:
                      type: string
                    message:
                      type: string

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sb-access-token
